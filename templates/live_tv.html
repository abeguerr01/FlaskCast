<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlaskCast TV - {{ titulo }}</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden;
        }
        .tv-player-wrapper {
            width: 100vw;
            height: 88vh;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .tv-msg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 1.2rem;
            padding: 20px;
        }
        .tv-footer {
            height: 12vh;
            background-color: #141414;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-top: 2px solid #e50914;
        }
        .video-name {
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50%;
            text-align: left;
        }
        .btn-tv {
            display: inline-block;
            padding: 12px 24px;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1rem;
            background-color: #333333;
        }
    </style>
</head>
<body>

    <div class="tv-player-wrapper">
        {% if tipo == 'video' %}
            <video controls autoplay preload="auto">
                <source src="{{ url }}">
                Tu Smart TV no soporta la decodificaci&oacute;n de este archivo de v&iacute;deo.
            </video>

        {% elif tipo == 'hls' %}
            <video id="tvPlayerHls" controls autoplay preload="auto"
                   src="{{ url }}"></video>
            <script>
                var v = document.getElementById('tvPlayerHls');
                v.onerror = function() {
                    document.body.innerHTML = '<div class="tv-msg">Tu navegador no soporta este stream HLS.<br><br><a href="{{ url }}" style="color:#e50914;">Abrir enlace directo</a></div>';
                };
            </script>

        {% elif tipo == 'iframe' %}
            <iframe src="{{ url }}" allowfullscreen></iframe>

        {% else %}
            <div class="tv-msg">
                <div>Tipo de stream no soportado en modo SmartTV.<br><br><a href="{{ url }}" style="color:#e50914;">Abrir enlace directo</a></div>
            </div>
        {% endif %}
    </div>

    <div class="tv-footer">
        <div class="video-name">{{ titulo }}</div>
        <div>
            <a href="/live" class="btn-tv">Volver a la lista</a>
        </div>
    </div>

</body>
</html>
