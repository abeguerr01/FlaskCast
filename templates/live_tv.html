<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlaskCast TV - {{ titulo }}</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden;
        }
        .tv-player-wrapper {
            width: 100vw;
            height: 88vh;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .tv-msg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 1.2rem;
            padding: 20px;
        }
        .tv-footer {
            height: 12vh;
            background-color: #141414;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-top: 2px solid #e50914;
        }
        .video-name {
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50%;
            text-align: left;
        }
        .btn-tv {
            display: inline-block;
            padding: 12px 24px;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1rem;
            background-color: #333333;
        }
    </style>
</head>
<body>

    <div class="tv-player-wrapper">
        {% if tipo == 'video' %}
            <video controls autoplay preload="auto"
                   data-urls="{{ urls | tojson }}"></video>
            <script>
                (function() {
                    var v = document.querySelector('.tv-player-wrapper video');
                    var urls = JSON.parse(v.getAttribute('data-urls'));
                    var idx = 0;
                    v.src = urls[idx];
                    v.onerror = function() {
                        if (idx < urls.length - 1) {
                            idx++;
                            v.src = urls[idx];
                        } else {
                            document.querySelector('.tv-player-wrapper').innerHTML = '<div class="tv-msg">Todas las fuentes fallaron.<br><br><a href="/live" style="color:#e50914;">Volver a la lista</a></div>';
                        }
                    };
                })();
            </script>

        {% elif tipo == 'hls' %}
            <video id="tvPlayerHls" controls autoplay preload="auto"></video>
            <script>
                (function() {
                    var v = document.getElementById('tvPlayerHls');
                    var urls = {{ urls | tojson }};
                    var idx = 0;

                    function intentarURL(i) {
                        if (v.canPlayType('application/vnd.apple.mpegurl')) {
                            v.src = urls[i];
                            v.onerror = function() {
                                if (i < urls.length - 1) {
                                    intentarURL(i + 1);
                                } else {
                                    document.querySelector('.tv-player-wrapper').innerHTML = '<div class="tv-msg">Todas las fuentes HLS fallaron.<br><br><a href="/live" style="color:#e50914;">Volver a la lista</a></div>';
                                }
                            };
                        } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                            var hls = new Hls();
                            hls.loadSource(urls[i]);
                            hls.attachMedia(v);
                            hls.on(Hls.Events.ERROR, function(event, data) {
                                if (data.fatal) {
                                    hls.destroy();
                                    if (i < urls.length - 1) {
                                        intentarURL(i + 1);
                                    } else {
                                        document.querySelector('.tv-player-wrapper').innerHTML = '<div class="tv-msg">Todas las fuentes HLS fallaron.<br><br><a href="/live" style="color:#e50914;">Volver a la lista</a></div>';
                                    }
                                }
                            });
                        } else {
                            document.querySelector('.tv-player-wrapper').innerHTML = '<div class="tv-msg">Tu navegador no soporta este stream HLS.<br><br><a href="' + urls[i] + '" style="color:#e50914;">Abrir enlace directo</a></div>';
                        }
                    }
                    intentarURL(0);
                })();
            </script>

        {% elif tipo == 'iframe' %}
            <iframe src="{{ urls[0] }}" allowfullscreen></iframe>

        {% else %}
            <div class="tv-msg">
                <div>Tipo de stream no soportado en modo SmartTV.<br><br><a href="{{ urls[0] }}" style="color:#e50914;">Abrir enlace directo</a></div>
            </div>
        {% endif %}
    </div>

    <div class="tv-footer">
        <div class="video-name">{{ titulo }}</div>
        <div>
            <a href="/live" class="btn-tv">Volver a la lista</a>
        </div>
    </div>

</body>
</html>
