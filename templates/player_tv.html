<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlaskCast TV - {{ filename.split('/')[-1] }}</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden;
        }
        .tv-player-wrapper {
            width: 100vw;
            height: 88vh;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .tv-footer {
            height: 12vh;
            background-color: #141414;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-top: 2px solid #e50914;
        }
        .video-name {
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }
        .btn-tv-back {
            display: inline-block;
            padding: 12px 24px;
            background-color: #e50914;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="tv-player-wrapper">
        <video controls autoplay preload="auto">
            <source src="{{ url_for('serve_video', nombre_serie=serie, filename=filename) }}" type="video/mp4">
            Tu Smart TV no soporta la decodificación de este archivo de vídeo.
        </video>
    </div>

    <div class="tv-footer">
        <div class="video-name">🍿 Viendo: {{ filename.split('/')[-1] }}</div>
        <a href="/serie/{{ serie }}" class="btn-tv-back">⬅ Volver a la Lista</a>
    </div>

</body>
</html>
