<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlaskCast TV - {{ filename.split('/')[-1] }}</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden;
        }
        .tv-player-wrapper {
            width: 100vw;
            height: 88vh;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .tv-footer {
            height: 12vh;
            background-color: #141414;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-top: 2px solid #e50914;
        }
        .video-name {
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 45%;
            text-align: left;
        }
        .tv-actions {
            display: flex;
            gap: 15px;
        }
        .btn-tv {
            display: inline-block;
            padding: 12px 24px;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .btn-tv-back {
            background-color: #333333;
        }
        .btn-tv-next {
            background-color: #e50914;
        }
        .btn-tv:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="tv-player-wrapper">
        <video id="tvPlayer" controls autoplay preload="auto" 
               data-serie="{{ serie }}" 
               data-filename="{{ filename }}" 
               data-inicio="{{ segundo_inicio }}">
            <source src="{{ url_for('serve_video', nombre_serie=serie, filename=filename) }}" type="video/mp4">
            Tu Smart TV no soporta la decodificación de este archivo de vídeo.
        </video>
    </div>

    <div class="tv-footer">
        <div class="video-name">🍿 Viendo: {{ filename.split('/')[-1] }}</div>
        <div class="tv-actions">
            <a href="/serie/{{ serie }}" class="btn-tv btn-tv-back">⬅ Volver a la Lista</a>
            {% if next_filename %}
                <a href="{{ url_for('reproductor_tv', nombre_serie=serie, filename=next_filename) }}" class="btn-tv btn-tv-next">⏭️ Siguiente Capítulo</a>
            {% endif %}
        </div>
    </div>

    <script>
        const player = document.getElementById('tvPlayer');
        const serie = player.getAttribute('data-serie');
        const filename = player.getAttribute('data-filename');
        const segundoInicio = parseFloat(player.getAttribute('data-inicio') || 0);
        
        let ultimoTiempoGuardado = 0;

        // Saltar automáticamente al segundo guardado al arrancar
        player.addEventListener('loadedmetadata', () => {
            if (segundoInicio > 5) {
                player.currentTime = segundoInicio;
            }
        });

        // Reportar el progreso al servidor cada 5 segundos
        player.addEventListener('timeupdate', () => {
            const tiempoActual = Math.floor(player.currentTime);
            if (tiempoActual % 5 === 0 && tiempoActual !== ultimoTiempoGuardado) {
                ultimoTiempoGuardado = tiempoActual;
                
                fetch('/api/progreso/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        serie: serie,
                        filename: filename,
                        segundos: player.currentTime,
                        visto: 0
                    })
                });
            }
        });

        // Marcar como visto al finalizar
        player.addEventListener('ended', () => {
            fetch('/api/progreso/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    serie: serie,
                    filename: filename,
                    segundos: 0,
                    visto: 1
                })
            }).then(() => {
                // Si hay un botón de siguiente capítulo, ir a él automáticamente al terminar
                const btnNext = document.querySelector('.btn-tv-next');
                if (btnNext) {
                    window.location.href = btnNext.href;
                }
            });
        });
    </script>
</body>
</html>
