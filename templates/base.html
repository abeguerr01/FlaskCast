<!DOCTYPE html>
<html lang="es" class="tema-{{ tema_actual }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FLASKCAST{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}sidebar-layout{% endblock %}">

    {% block sidebar %}
    <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle-input">
    <label for="sidebar-toggle" class="sidebar-toggle-label">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </label>
    <label for="sidebar-toggle" class="sidebar-overlay"></label>
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">FLASKCAST</a>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link {% if active_section == 'catalogo' %}sidebar-link-active{% endif %}">
                <span class="sidebar-icon">🎬</span>
                <span>Pelis y Series</span>
            </a>
            <a href="/live" class="sidebar-link {% if active_section == 'directo' %}sidebar-link-active{% endif %}">
                <span class="sidebar-icon">📡</span>
                <span>Contenido en directo</span>
            </a>
            {% if session.get('usuario_id') %}
            <a href="/listas" class="sidebar-link {% if active_section == 'listas' %}sidebar-link-active{% endif %}">
                <span class="sidebar-icon">📋</span>
                <span>Listas</span>
            </a>
            {% endif %}
        </nav>
    </div>
    {% endblock %}

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script>
    (function() {
        var content = document.querySelector('.main-content');
        if (!content) return;

        document.addEventListener('click', function(e) {
            var link = e.target.closest('a[href]');
            if (!link) return;

            var href = link.getAttribute('href');
            if (!href || href.charAt(0) === '#' || href.indexOf('mailto:') === 0 || href.indexOf('javascript:') === 0) return;
            if (link.target === '_blank') return;
            if (link.hasAttribute('data-no-transition')) return;
            if (link.closest('.modal-overlay') || link.closest('.player-container') || link.closest('.keyboard-indicator')) return;
            if (link.closest('button') && !href) return;

            var url;
            try { url = new URL(href, window.location.origin); } catch(ex) { return; }
            if (url.origin !== window.location.origin) return;
            if (url.pathname === window.location.pathname && url.search === window.location.search) return;

            e.preventDefault();
            content.classList.add('page-exit');
            setTimeout(function() { window.location.href = href; }, 200);
        });
    })();
    </script>

</body>
</html>
