<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FLASKCAST{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}sidebar-layout{% endblock %}">

    {% block sidebar %}
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="sidebar-logo">FLASKCAST</a>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link {% if active_section == 'catalogo' %}sidebar-link-active{% endif %}">
                <span class="sidebar-icon">🎬</span>
                <span>Pelis y Series</span>
            </a>
            <a href="/live" class="sidebar-link {% if active_section == 'directo' %}sidebar-link-active{% endif %}">
                <span class="sidebar-icon">📡</span>
                <span>Contenido en directo</span>
            </a>
        </nav>
    </div>
    {% endblock %}

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
